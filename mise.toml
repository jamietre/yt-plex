[env]
_.file = ".env"

[tools]
node = "24"
pnpm = "10"

[tasks.web-install]
description = "Install web dependencies"
run = "pnpm install"
dir = "web"

[tasks.web-build]
description = "Build the web UI"
run = "pnpm build"
dir = "web"

[tasks.web-dev]
description = "Run the frontend dev server"
run = "pnpm dev"
dir = "web"

[tasks.build]
description = "Build everything (web UI then Rust binary)"
depends = ["web-build"]
run = "cargo build --release -p yt-plex-server"

[tasks.dev-server]
description = "Run backend with auto-reload (requires cargo-watch)"
env = { YT_PLEX_CONFIG = ".config/yt-plex/config.toml" }
run = "cargo watch -x 'run -p yt-plex-server'"

[tasks.dev]
description = "Run backend and frontend dev servers concurrently"
depends = ["dev-server", "web-dev"]

[tasks.db-reset]
description = "Delete the local SQLite database (forces schema re-creation on next server start)"
run = "rm -f ~/.local/share/yt-plex/db.sqlite ~/.local/share/yt-plex/db.sqlite-wal ~/.local/share/yt-plex/db.sqlite-shm"

[tasks.docker-build]
description = "Build the yt-plex Docker image (set REGISTRY in .env to also tag for a private registry)"
run = """
docker build -t yt-plex:latest .
if [ -n "${REGISTRY:-}" ]; then
    docker tag yt-plex:latest "$REGISTRY/yt-plex:latest"
fi
"""

[tasks.docker-push]
description = 'Push yt-plex image to the private registry (requires REGISTRY in .env)'
run = """
if [ -z "${REGISTRY:-}" ]; then
    echo "Set REGISTRY in .env (e.g. REGISTRY=192.168.1.100:5000)"
    exit 1
fi
docker push "$REGISTRY/yt-plex:latest"
"""

[tasks.docker-deploy]
description = 'Push image to registry and redeploy via Komodo API'
depends = ["docker-push"]
run = "bash scripts/komodo-deploy.sh"

[tasks.docker-push-config]
description = 'Push config.toml to $DEPLOY_HOST (required in .env)'
run = """
if [ -z "${DEPLOY_HOST:-}" ]; then
    echo "Set DEPLOY_HOST in .env (e.g. DEPLOY_HOST=root@192.168.1.100)"
    exit 1
fi
scp .config/yt-plex/config.toml "$DEPLOY_HOST:/docker/yt-plex/config/config.toml"
"""

[tasks.docker-logs]
description = 'Tail container logs on $DEPLOY_HOST (required in .env)'
run = """
if [ -z "${DEPLOY_HOST:-}" ]; then
    echo "Set DEPLOY_HOST in .env (e.g. DEPLOY_HOST=root@192.168.1.100)"
    exit 1
fi
ssh "$DEPLOY_HOST" 'docker logs -f $(docker ps -qf name=yt-plex) 2>/dev/null || echo "Container not running"'
"""
