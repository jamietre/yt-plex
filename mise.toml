[env]
_.file = ".env"

[tools]
node = "24"
pnpm = "10"

[tasks.web-install]
description = "Install web dependencies"
run = "pnpm install"
dir = "web"

[tasks.web-build]
description = "Build the web UI"
run = "pnpm build"
dir = "web"

[tasks.web-dev]
description = "Run the frontend dev server"
run = "pnpm dev"
dir = "web"

[tasks.build]
description = "Build everything (web UI then Rust binary)"
depends = ["web-build"]
run = "cargo build --release -p yt-plex-server"

[tasks.dev-server]
description = "Run backend with auto-reload (requires cargo-watch)"
env = { YT_PLEX_CONFIG = ".config/yt-plex/config.toml" }
run = "cargo watch -x 'run -p yt-plex-server'"

[tasks.dev]
description = "Run backend and frontend dev servers concurrently"
depends = ["dev-server", "web-dev"]

[tasks.db-reset]
description = "Delete the local SQLite database (forces schema re-creation on next server start)"
run = "rm -f ~/.local/share/yt-plex/db.sqlite ~/.local/share/yt-plex/db.sqlite-wal ~/.local/share/yt-plex/db.sqlite-shm"

[tasks.docker-build]
description = "Build the yt-plex Docker image"
run = "docker build -t yt-plex:latest -t PRIVATE_IP_REDACTED:5000/yt-plex:latest ."

[tasks.docker-push]
description = 'Push yt-plex image to the local registry at PRIVATE_IP_REDACTED:5000'
run = "docker push PRIVATE_IP_REDACTED:5000/yt-plex:latest"

[tasks.docker-deploy]
description = 'Push image to registry and redeploy via Komodo API'
depends = ["docker-push"]
run = "bash scripts/komodo-deploy.sh"

[tasks.docker-push-config]
description = 'Push config.toml to $DEPLOY_HOST'
run = """
HOST=${DEPLOY_HOST:-root@PRIVATE_IP_REDACTED}
scp .config/yt-plex/config.toml "$HOST:/docker/yt-plex/config/config.toml"
"""

[tasks.docker-logs]
description = 'Tail container logs on $DEPLOY_HOST'
run = """
HOST=${DEPLOY_HOST:-root@PRIVATE_IP_REDACTED}
ssh "$HOST" 'docker logs -f $(docker ps -qf name=yt-plex) 2>/dev/null || echo "Container not running"'
"""
