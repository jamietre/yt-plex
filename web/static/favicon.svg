<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#111111"/>

  <!-- Film strip bands -->
  <rect x="0" y="0" width="32" height="6" rx="5" fill="#1c1c1c"/>
  <rect x="0" y="26" width="32" height="6" rx="5" fill="#1c1c1c"/>
  <!-- Square the top-right and bottom-right corners of the top band -->
  <rect x="16" y="0" width="16" height="6" fill="#1c1c1c"/>
  <rect x="16" y="26" width="16" height="6" fill="#1c1c1c"/>

  <!-- Film holes top -->
  <rect x="3"  y="1.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="10" y="1.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="17" y="1.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="24" y="1.5" width="4" height="3" rx="1" fill="#333333"/>

  <!-- Film holes bottom -->
  <rect x="3"  y="27.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="10" y="27.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="17" y="27.5" width="4" height="3" rx="1" fill="#333333"/>
  <rect x="24" y="27.5" width="4" height="3" rx="1" fill="#333333"/>

  <!-- Amber play triangle -->
  <polygon points="11,10 11,22 23,16" fill="#e8a020"/>
</svg>
